<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AegisQ Whitepaper</title>

  <link rel="icon" href="logo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #05070d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e6edf3;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* GRID BACKGROUND LIKE EXPLORER */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(#111 1px, transparent 1px),
                        linear-gradient(90deg, #111 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
      z-index: -1;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .logo {
      width: 90px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
    }

    .subtitle {
      color: #8b949e;
      font-size: 14px;
      margin-top: 8px;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: #00d4ff;
      margin: 20px auto;
      opacity: 0.6;
    }

    .viewer {
      flex: 1;
      width: 92%;
      margin: 20px auto 40px;
      background: #0b0f19;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.7);
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      background: white;
    }

    .footer {
      text-align: center;
      margin-bottom: 20px;
      font-size: 13px;
      color: #6e7681;
    }

    .footer a {
      color: #00d4ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <img src="logo.png" class="logo">

    <div class="title">AegisQ Consensus Protocol</div>

    <div class="subtitle">
      Deterministic Consensus • Adversarial Analysis • System-Level Design
    </div>

    <div class="divider"></div>
  </div>

  <!-- PDF VIEWER -->
  <div class="viewer">
    <iframe src="AegisQ_Consensus_Protocol_Whitepaper.pdf"></iframe>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    PDF not loading? 
    <a href="AegisQ_Consensus_Protocol_Whitepaper.pdf" target="_blank">
      Open directly
    </a>
  </div>

</body>
</html>
