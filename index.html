<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AegisQ Whitepaper</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #0b0f19, #05070d);
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .logo {
      width: 90px;
      margin-bottom: 15px;
    }

    .title {
      font-size: 36px;
      font-weight: 700;
      margin: 10px 0;
    }

    .subtitle {
      color: #8b949e;
      font-size: 14px;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: #58a6ff;
      margin: 20px auto;
      opacity: 0.6;
    }

    .viewer {
      width: 92%;
      margin: 30px auto 50px;
      background: #0d1117;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    iframe {
      width: 100%;
      height: 900px;
      border: none;
    }

    .footer {
      text-align: center;
      margin-bottom: 40px;
      font-size: 13px;
      color: #6e7681;
    }

    .footer a {
      color: #58a6ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <!-- HERO SECTION -->
  <div class="hero">
    <img src="logo.png" class="logo">

    <div class="title">AegisQ Consensus Protocol</div>

    <div class="subtitle">
      Deterministic Consensus • Adversarial Analysis • System-Level Design
    </div>

    <div class="divider"></div>
  </div>

  <!-- PDF VIEWER -->
  <div class="viewer">
    <iframe src="AegisQ_Consensus_Protocol_Whitepaper.pdf"></iframe>
  </div>

  <!-- FALLBACK -->
  <div class="footer">
    PDF not loading? 
    <a href="AegisQ_Consensus_Protocol_Whitepaper.pdf" target="_blank">
      Open directly
    </a>
  </div>

</body>
</html>
